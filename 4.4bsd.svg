<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" role="img" aria-labelledby="title desc">
  <title id="title">4.4BSD BSD Software logo</title>
  <desc id="desc">A 4.4bsd.dev wordmark reading 4.4BSD with the tagline Building cool stuff with BSD.</desc>
  <defs>    <linearGradient id="accentGradient" x1="90" y1="0" x2="470" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#30363d"/>
      <stop offset="0.5" stop-color="#3fb950"/>
      <stop offset="1" stop-color="#30363d"/>
    </linearGradient>
    <linearGradient id="puffyBody" x1="440" y1="54" x2="528" y2="142" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ee0d6"/>
      <stop offset="1" stop-color="#258a94"/>
    </linearGradient>
    <linearGradient id="puffyFin" x1="430" y1="90" x2="548" y2="134" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#48c463"/>
      <stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <filter id="titleShadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="greenGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3fb950" flood-opacity="0.35"/>
    </filter>
</defs>
<style>
  svg {
    color-scheme: light dark;
    --title-fill: #24292f;
    --title-halo: #ffffff;
    --title-outline: #d0d7de;
    --rule: #d0d7de;
    --rule-strong: #8c959f;
    --accent-shadow: #d0d7de;
  }
  @media (prefers-color-scheme: dark) {
    svg {
      --title-fill: #f0f6fc;
      --title-halo: #05070a;
      --title-outline: #30363d;
      --rule: #161b22;
      --rule-strong: #30363d;
      --accent-shadow: #111820;
    }
  }
  .title-halo {
    fill: none;
    stroke: var(--title-halo);
    stroke-width: 16;
    stroke-linejoin: round;
    paint-order: stroke;
  }
  .title-outline {
    fill: none;
    stroke: var(--title-outline);
    stroke-width: 8;
    stroke-linejoin: round;
    paint-order: stroke;
  }
  .title-fill,
  .tagline {
    fill: var(--title-fill);
  }
  .tagline {
    opacity: 0.78;
  }
  .rule {
    stroke: var(--rule);
  }
  .rule-strong {
    stroke: var(--rule-strong);
  }
  .accent-shadow {
    stroke: var(--accent-shadow);
  }
  .puffy {
    animation: puffy-swim 8.5s ease-in-out infinite;
    transform-origin: 486px 112px;
  }
  .puffy-fin-left {
    animation: fin-left 1.7s ease-in-out infinite;
    transform-origin: 443px 118px;
  }
  .puffy-fin-right {
    animation: fin-right 1.9s ease-in-out infinite;
    transform-origin: 520px 116px;
  }
  @keyframes puffy-swim {
    0%, 100% { transform: translate(-15px, 0) rotate(0deg); }
    32% { transform: translate(-4px, -5px) rotate(2deg); }
    68% { transform: translate(-24px, 4px) rotate(-2deg); }
  }
  @keyframes fin-left {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(-7deg); }
  }
  @keyframes fin-right {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(8deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .puffy,
    .puffy-fin-left,
    .puffy-fin-right {
      animation: none;
    }
    .puffy {
      transform: translate(-15px, 0);
    }
  }
</style>

<path class="rule" d="M32 38h496M32 182h496" stroke-width="1" opacity="0.62"/>
<path class="rule-strong" d="M88 32h384" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <g class="puffy">
    <path class="puffy-fin-left" d="M444 105c-15-15-27-19-39-19 7 17 18 27 34 32-15 5-25 15-31 30 21-1 35-10 45-27z"
          fill="url(#puffyFin)" stroke="#05070a" stroke-width="6" stroke-linejoin="round"/>
    <path class="puffy-fin-right" d="M520 95c18-10 33-10 46-3-10 13-23 20-41 20 13 9 20 20 21 36-19-4-30-15-37-31z"
          fill="url(#puffyFin)" stroke="#05070a" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="487" cy="111" r="45" fill="url(#puffyBody)" stroke="#05070a" stroke-width="7"/>
    <circle cx="470" cy="99" r="15" fill="#f6f7f2" stroke="#05070a" stroke-width="5"/>
    <circle cx="501" cy="99" r="15" fill="#f6f7f2" stroke="#05070a" stroke-width="5"/>
    <circle cx="475" cy="103" r="5" fill="#0f1419"/>
    <circle cx="496" cy="103" r="5" fill="#0f1419"/>
    <path d="M471 129l13 10-13 10" fill="none" stroke="#f6f7f2" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M492 149h20" stroke="#3fb950" stroke-width="7" stroke-linecap="round"/>
  </g>

<g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" text-anchor="middle">
  <text class="title-halo" x="280" y="122" font-size="86"
        font-weight="800" letter-spacing="-1.5" filter="url(#titleShadow)">4.4BSD</text>
  <text class="title-outline" x="280" y="122" font-size="86"
        font-weight="800" letter-spacing="-1.5">4.4BSD</text>
  <text class="title-fill" x="280" y="122" font-size="86" font-weight="800"
        letter-spacing="-1.5" filter="url(#greenGlow)">4.4BSD</text>
</g>

<path class="accent-shadow" d="M90 176h380" stroke-width="8" stroke-linecap="round"/>
  <path d="M90 176h380" stroke="url(#accentGradient)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="280" cy="176" r="5" fill="#3fb950"/>
  <text class="tagline" x="280" y="204"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        text-anchor="middle" font-size="18" font-weight="650">Building cool stuff with BSD</text>
</svg>
